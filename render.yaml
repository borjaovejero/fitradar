envVarGroups:
  - name: secrets-prod
    envVars:
      - key: API_HOST_SECRET_KEY
        sync: false
      - key: IP_KEY_SALT
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: webusers-postgres
    postgresMajorVersion: 16
    databaseName: fitradar
    plan: free
    ipAllowList: []

services:
  - type: redis
    name: web-redis
    plan: free
    ipAllowList: []

  - type: web
    name: fitradar-ml-api
    env: docker
    plan: free
    dockerfilePath: ./ml-api/Dockerfile
    dockerContext: ./ml-api
    healthCheckPath: /health

  - type: web
    name: fitradar-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: webusers-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: web-redis
          type: redis
          property: connectionString
      - key: ML_API_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: "10000"
      - fromGroup: secrets-prod

  - type: web
    name: fitradar-frontend
    env: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /
    envVars:
      - key: BACKEND_BASE_URL
        sync: false
      - key: PORT
        value: "10000"